<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cookie Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d1a;
  --panel:   #161628;
  --border:  #2a2a45;
  --accent:  #ffb830;
  --accent2: #ff7820;
  --green:   #4de88a;
  --red:     #e84d4d;
  --gray:    #6a6a8a;
  --text:    #e8e0d0;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100dvh;
  overflow: hidden;
  user-select: none;
}

/* ── Layout mobile (colonne) ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Layout desktop (2 colonnes) ── */
@media (min-width: 700px) {
  body { overflow: auto; background: #07070f; }
  #app {
    flex-direction: row;
    max-width: 860px;
    margin: 0 auto;
    height: 100dvh;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  #left  { flex: 1; border-right: 1px solid var(--border); }
  #right { width: 280px; }
  #header { display: none; }
}

/* ── Header mobile ── */
#header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 16px 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#hdr-count {
  font-family: 'Pixelify Sans', monospace;
  font-size: clamp(20px, 5.5vw, 28px);
  color: var(--accent);
}
#hdr-cps { font-size: 11px; color: var(--green); min-width: 60px; }

/* ── Zone cookie ── */
#left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 20px 16px;
  background: var(--panel);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

/* score desktop */
#score-desktop { display: none; flex-direction: column; align-items: center; gap: 4px; }
@media (min-width: 700px) { #score-desktop { display: flex; } }
#desk-count {
  font-family: 'Pixelify Sans', monospace;
  font-size: 30px;
  color: var(--accent);
  letter-spacing: 2px;
}
#desk-cps { font-size: 12px; color: var(--green); min-height: 16px; }

/* barre progression */
#progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; width: min(220px, 65vw); }
#progress-bg {
  width: 100%; height: 7px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
#progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 4px;
  transition: width 0.5s ease;
}
#progress-lbl { font-size: 10px; color: var(--gray); letter-spacing: 1px; }

/* ── Cookie ── */
#cookie-wrap {
  position: relative;
  width: clamp(90px, 22vw, 120px);
  height: clamp(90px, 22vw, 120px);
  cursor: pointer;
  transition: transform 0.1s ease;
}
#cookie-svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 6px 22px rgba(205,133,63,0.4));
  transition: transform 0.08s ease, filter 0.08s ease;
  transform-origin: center;
}
#cookie-wrap.pressed #cookie-svg {
  transform: scale(0.82) rotate(-4deg);
  filter: drop-shadow(0 2px 10px rgba(255,184,48,0.6));
}
#cookie-glow {
  position: absolute;
  inset: -35%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,184,48,0.4) 0%, transparent 65%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.06s;
}
#cookie-wrap.pressed #cookie-glow { opacity: 1; }

#cookie-hint { font-size: 10px; color: var(--gray); letter-spacing: 2px; }

#game-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.game-btn {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--gray);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.game-btn:hover  { border-color: var(--accent); color: var(--accent); background: rgba(255,184,48,0.07); }
.game-btn:active { background: rgba(255,184,48,0.15); transform: scale(0.96); }

/* ── Canvas particules ── */
#fx-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events: none;
  z-index: 999;
}

/* ── Upgrades ── */
#right {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  flex: 1;
  min-height: 0;
}
#upgrades-panel {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  border-top: 1px solid var(--border);
  padding: 8px 8px 20px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
#upgrades-panel::-webkit-scrollbar { width: 3px; }
#upgrades-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#upg-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--gray);
  text-transform: uppercase;
  padding: 6px 4px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  flex-shrink: 0;
}

.upg {
  display: grid;
  grid-template-columns: 34px 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
  min-height: 50px;
}
.upg:active { transform: scale(0.97); }
.upg.can { border-color: rgba(77,232,138,0.45); background: rgba(77,232,138,0.07); }
.upg.can:active { background: rgba(77,232,138,0.15); }
.upg-icon { font-size: 20px; text-align: center; }
.upg-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.upg-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.upg.can .upg-name { color: #fff; font-weight: 500; }
.upg-sub { font-size: 10px; color: var(--gray); }
.upg.can .upg-sub { color: var(--green); }
.upg-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.upg-cost { font-size: 11px; color: var(--gray); white-space: nowrap; }
.upg.can .upg-cost { color: var(--accent2); font-weight: 500; }
.upg-owned { font-size: 10px; color: var(--accent); }

/* ── Float text ── */
@keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-65px) scale(0.4);opacity:0} }
.float-text {
  position: fixed;
  pointer-events: none;
  font-family: 'Pixelify Sans', monospace;
  font-size: 20px;
  color: var(--accent);
  z-index: 1000;
  animation: floatUp 0.75s ease-out forwards;
  text-shadow: 0 0 12px rgba(255,184,48,0.9);
}

/* ── Victory ── */
#victory {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; text-align: center; padding: 24px;
}
#victory.show { display: flex; }
#victory h2 {
  font-family: 'Pixelify Sans', monospace;
  font-size: clamp(26px, 7vw, 46px);
  color: var(--accent);
  text-shadow: 0 0 40px rgba(255,184,48,0.5);
}
#victory p { color: var(--green); font-size: 13px; letter-spacing: 1px; }
.v-btn {
  padding: 11px 26px; border-radius: 8px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 1px;
  transition: background 0.15s;
}
#v-snake { border: 1px solid var(--accent); background: rgba(255,184,48,0.1); color: var(--accent); }
#v-snake:active { background: rgba(255,184,48,0.25); }
#v-cont  { border: 1px solid var(--gray); background: transparent; color: var(--gray); }
#v-cont:active { background: rgba(255,255,255,0.05); }

/* ── Boutons game over ── */
.game-over-btn {
  font-family: 'DM Mono', monospace; padding: 8px 20px;
  border-radius: 6px; cursor: pointer; font-size: 11px; letter-spacing: 1px;
  transition: all 0.15s;
}
.retry-btn { border: 1px solid var(--accent); color: var(--accent); background: rgba(255,184,48,0.08); }
.retry-btn:active { background: rgba(255,184,48,0.22); }
.quit-btn  { border: 1px solid #2a2a2a; color: #555; background: transparent; }
.quit-btn:active  { color: #888; border-color: #444; }

/* ── Victoire million ── */
#million-overlay {
  display: none; position: fixed; inset: 0; z-index: 5000;
  background: rgba(0,0,0,0.92);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; text-align: center; padding: 24px;
}
#million-overlay.show { display: flex; }
#million-overlay h2 {
  font-family: 'Pixelify Sans', monospace;
  font-size: clamp(30px, 8vw, 56px);
  color: var(--accent);
  text-shadow: 0 0 60px rgba(255,184,48,0.8), 0 0 120px rgba(255,120,30,0.4);
  animation: million-pulse 1.2s ease-in-out infinite alternate;
}
@keyframes million-pulse {
  from { text-shadow: 0 0 40px rgba(255,184,48,0.6), 0 0 80px rgba(255,120,30,0.3); }
  to   { text-shadow: 0 0 80px rgba(255,184,48,1),   0 0 160px rgba(255,120,30,0.7); }
}
#million-overlay p { color: var(--green); font-size: 13px; letter-spacing: 2px; }
#million-overlay .sub { color: var(--gray); font-size: 11px; }
#million-close {
  margin-top: 8px; padding: 12px 32px;
  border-radius: 8px; border: 1px solid var(--accent);
  background: rgba(255,184,48,0.12); color: var(--accent);
  font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 2px;
  cursor: pointer; transition: background 0.15s;
}
#million-close:active { background: rgba(255,184,48,0.28); }
#confetti-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 4999;
}

/* ── Snake ── */
#snake-overlay {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 3000;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; touch-action: none;
}
#snake-overlay.show { display: flex; }
#snake-canvas { border: 1px solid #222; }
#snake-score { font-family: 'Pixelify Sans', monospace; font-size: 18px; color: #fff; }
#dpad {
  display: grid;
  grid-template-areas: ". u ." "l . r" ". d .";
  gap: 5px;
}
.dp {
  width: 54px; height: 54px;
  background: #111; border: 1px solid #2a2a2a; border-radius: 10px;
  font-size: 22px; color: #ccc;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s;
}
.dp:active { background: #222; color: #fff; }
#snake-quit {
  font-family: 'DM Mono', monospace; padding: 7px 18px;
  background: transparent; border: 1px solid #2a2a2a; color: #555;
  border-radius: 6px; cursor: pointer; font-size: 11px; letter-spacing: 1px;
}
#snake-quit:active { color: #888; border-color: #444; }

/* ── Breakout overlay ── */
#breakout-overlay {
  display: none; position: fixed; inset: 0;
  background: #060610; z-index: 4000;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; touch-action: none;
}
#breakout-overlay.show { display: flex; }
#brk-score {
  font-family: 'Pixelify Sans', monospace;
  font-size: 18px; color: var(--accent);
}
#brk-canvas { border: 1px solid #222; touch-action: none; display: block; }
#brk-controls { display: flex; gap: 12px; }
#brk-quit {
  font-family: 'DM Mono', monospace; padding: 7px 18px;
  background: transparent; border: 1px solid #2a2a2a; color: #555;
  border-radius: 6px; cursor: pointer; font-size: 11px; letter-spacing: 1px;
}
#brk-quit:active { color: #888; border-color: #444; }
</style>
</head>
<body>

<div id="header">
  <span id="hdr-count">0</span>
  <span id="hdr-cps"></span>
</div>

<div id="app">

  <!-- Zone cookie -->
  <div id="left">
    <div id="score-desktop">
      <div id="desk-count">0 🍪</div>
      <div id="desk-cps"></div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bg"><div id="progress-fill"></div></div>
      <div id="progress-lbl">0 / 10 000</div>
    </div>

    <div id="cookie-wrap">
      <div id="cookie-glow"></div>
      <svg id="cookie-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cg" cx="33%" cy="28%" r="68%">
            <stop offset="0%"   stop-color="#f7d08a"/>
            <stop offset="38%"  stop-color="#cd853f"/>
            <stop offset="78%"  stop-color="#9e4f18"/>
            <stop offset="100%" stop-color="#7a3410"/>
          </radialGradient>
          <radialGradient id="shine" cx="30%" cy="26%" r="44%">
            <stop offset="0%"   stop-color="rgba(255,248,215,0.62)"/>
            <stop offset="55%"  stop-color="rgba(255,228,155,0.12)"/>
            <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
          </radialGradient>
          <filter id="dshadow" x="-15%" y="-15%" width="130%" height="135%">
            <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.55)"/>
          </filter>
          <clipPath id="cc"><circle cx="50" cy="50" r="46"/></clipPath>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#cg)" filter="url(#dshadow)"/>
        <g clip-path="url(#cc)" stroke="rgba(75,28,5,0.28)" stroke-width="1.3" fill="none">
          <path d="M47 17 Q54 33 63 41"/>
          <path d="M30 32 Q39 47 37 62"/>
          <path d="M62 58 Q53 72 56 83"/>
          <path d="M38 24 Q32 38 35 50"/>
        </g>
        <circle cx="50" cy="50" r="46" fill="url(#shine)"/>
        <g id="chips-svg"></g>
        <circle cx="50" cy="50" r="45.2" fill="none" stroke="rgba(55,18,4,0.45)" stroke-width="1.6"/>
      </svg>
    </div>

    <div id="cookie-hint">APPUIE POUR CLIQUER</div>

    <!-- Boutons mini-jeux -->
    <div id="game-btns">
      <button class="game-btn" id="btn-snake">🐍 Snake</button>
      <button class="game-btn" id="btn-breakout">🧱 Breakout</button>
    </div>
  </div>

  <!-- Upgrades -->
  <div id="right">
    <div id="upgrades-panel">
      <div id="upg-title">Améliorations</div>
    </div>
  </div>

</div>

<canvas id="fx-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- Victory 10k -->
<div id="victory">
  <h2>🍪 10 000 cookies !</h2>
  <p>Easter Egg débloqué — Snake !</p>
  <button class="v-btn" id="v-snake">JOUER AU SNAKE</button>
  <button class="v-btn" id="v-cont">Continuer</button>
</div>

<!-- Victory 1M -->
<div id="million-overlay">
  <h2>🏆 1 000 000 !</h2>
  <p>TU AS ATTEINT LE MILLION</p>
  <div class="sub">Maître boulanger légendaire</div>
  <button id="million-close">CONTINUER</button>
</div>

<!-- Breakout -->
<div id="breakout-overlay">
  <div id="brk-score">Briques : 0</div>
  <canvas id="brk-canvas"></canvas>
  <div id="brk-controls">
    <div id="brk-left"  class="dp" style="width:80px;">◀</div>
    <div id="brk-right" class="dp" style="width:80px;">▶</div>
  </div>
  <div style="font-size:10px;color:#555;letter-spacing:1px;">GLISSE ou boutons pour bouger</div>
  <div style="display:flex;gap:10px;">
    <div id="brk-retry" class="game-over-btn retry-btn" style="display:none;">↺ REJOUER</div>
    <div id="brk-quit" class="game-over-btn quit-btn">QUITTER</div>
  </div>
</div>

<!-- Snake -->
<div id="snake-overlay">
  <div id="snake-score">Score : 0</div>
  <canvas id="snake-canvas"></canvas>
  <div id="dpad">
    <div class="dp" style="grid-area:u" id="d-u">↑</div>
    <div class="dp" style="grid-area:l" id="d-l">←</div>
    <div class="dp" style="grid-area:r" id="d-r">→</div>
    <div class="dp" style="grid-area:d" id="d-d">↓</div>
  </div>
  <div id="snake-retry" class="game-over-btn retry-btn" style="display:none;">↺ REJOUER</div>
  <div style="height:40px;"></div>
  <div id="snake-quit" class="game-over-btn quit-btn">QUITTER</div>
</div>

<script>
// ── Pépites SVG ──
(function() {
  const g = document.getElementById('chips-svg');
  const ns = 'http://www.w3.org/2000/svg';
  for (let i = 0; i < 13; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = 6 + Math.random() * 29;
    const cx = 50 + Math.cos(a)*d, cy = 50 + Math.sin(a)*d;
    const e = document.createElementNS(ns,'ellipse');
    e.setAttribute('cx', cx); e.setAttribute('cy', cy);
    e.setAttribute('rx','2.7'); e.setAttribute('ry','2');
    e.setAttribute('transform',`rotate(${Math.random()*50-25} ${cx} ${cy})`);
    e.setAttribute('fill','#3d180a');
    g.appendChild(e);
    const s = document.createElementNS(ns,'ellipse');
    s.setAttribute('cx',cx-0.7); s.setAttribute('cy',cy-0.6);
    s.setAttribute('rx','0.85'); s.setAttribute('ry','0.55');
    s.setAttribute('fill','rgba(215,145,65,0.38)');
    g.appendChild(s);
  }
})();

// ── Jeu ──
let cookies = 0;
let victoryShown = false;   // 10k snake
let millionShown = false;   // 1M

const upgrades = [
  { name:"Curseur",       icon:"🖱️",  cost:10,       cps:0.1,   owned:0 },
  { name:"Grand-mère",    icon:"👵",  cost:100,      cps:0.5,   owned:0 },
  { name:"Ferme",         icon:"🌾",  cost:500,      cps:4,     owned:0 },
  { name:"Usine",         icon:"🏭",  cost:3000,     cps:10,    owned:0 },
  { name:"Mine",          icon:"⛏️",  cost:10000,    cps:40,    owned:0 },
  { name:"Laboratoire",   icon:"🔬",  cost:50000,    cps:100,   owned:0 },
  { name:"Temple",        icon:"⛩️",  cost:200000,   cps:400,   owned:0 },
  { name:"Portail",       icon:"🌀",  cost:750000,   cps:2000,  owned:0 },
  { name:"Machine Temp.", icon:"⏳",  cost:3000000,  cps:8000,  owned:0 },
];

function getCps() { return upgrades.reduce((s,u)=>s+u.owned*u.cps,0); }

function fmt(n) {
  if (n >= 1e9)  return (n/1e9).toFixed(2)+" Md";
  if (n >= 1e6)  return (n/1e6).toFixed(2)+" M";
  if (n >= 1000) return (n/1000).toFixed(1)+" k";
  if (n < 1 && n > 0) return n.toFixed(2);
  return Math.floor(n).toLocaleString('fr-FR');
}

// ── Particules ──
const fxCanvas = document.getElementById('fx-canvas');
const fxCtx = fxCanvas.getContext('2d');
let particles = [];

// ── Confettis million ──
const confCanvas = document.getElementById('confetti-canvas');
const confCtx = confCanvas.getContext('2d');
let confettis = [];
let confActive = false;

function resizeFx() {
  fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight;
  confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight;
}
resizeFx(); window.addEventListener('resize', resizeFx);

function launchConfettis() {
  confActive = true;
  confettis = [];
  const colors = ['#ffb830','#ff7820','#4de88a','#4d9de8','#e84d4d','#ffe045','#c084fc'];
  for (let i = 0; i < 180; i++) {
    confettis.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 200,
      vx: (Math.random()-0.5)*3,
      vy: 2 + Math.random()*4,
      rot: Math.random()*360,
      rotV: (Math.random()-0.5)*8,
      w: 6+Math.random()*8, h: 4+Math.random()*5,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1
    });
  }
  // Stop after 4s
  setTimeout(() => { confActive = false; confettis = []; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }, 4000);
}

function spawnParticles(x, y) {
  for (let i = 0; i < 16; i++) {
    const a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3.5;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2.2,
      life:1, size:2.5+Math.random()*4,
      color: Math.random()<0.55 ? '#ffb830':'#ff7820' });
  }
}

function spawnFloat(x, y, text='+1') {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = (x-12)+'px';
  el.style.top  = (y-28)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 750);
}

// ── Boucle principale ──
let lastTime = performance.now();
let lastFloor = -1;
let gameActive = true; // false pendant snake/breakout

function loop(now) {
  const dt = Math.min((now - lastTime)/1000, 0.1);
  lastTime = now;

  if (gameActive) {
    cookies += getCps() * dt;
  }

  // Particules click
  fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  for (const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.13; p.life-=dt*2;
    fxCtx.globalAlpha = Math.max(0,p.life);
    fxCtx.fillStyle = p.color;
    fxCtx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  fxCtx
